services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - fase3net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD", "bash", "-c", "nc -z localhost 9092" ]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - fase3net

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    restart: always
    command: mongod --bind_ip_all
    volumes:
      - mongo_data:/data/db
    networks:
      - fase3net

  procpag:
    image: docker.io/erickemprobr/procpag:latest
    ports:
      - "8089:8089"
    networks:
      - fase3net

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    depends_on:
      - user-service
    ports:
      - "8086:8080"
    networks:
      - fase3net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    depends_on:
      - mongo
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/userdb
    ports:
      - "8083:8080"
    networks:
      - fase3net

  restaurant-service:
    build:
      context: .
      dockerfile: restaurant-service/Dockerfile
    depends_on:
      - mongo
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/restaurant-db
    ports:
      - "8084:8080"
    networks:
      - fase3net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      procpag:
        condition: service_started
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET: earliest
      SPRING_KAFKA_CONSUMER_GROUP_ID: payment-service
      PAYMENT_API_URL: http://procpag:8089/requisicao
    ports:
      - "8082:8080"
    networks:
      - fase3net

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      procpag:
        condition: service_started
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATA_MONGODB_URI: mongodb://mongo:27017/order-db
    ports:
      - "8085:8080"
    networks:
      - fase3net



networks:
  fase3net:
volumes:
  mongo_data: