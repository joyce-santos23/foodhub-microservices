
# Kafka configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.auto-offset-reset=${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:payment-service}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.listener.ack-mode=record
spring.kafka.listener.type=single
spring.kafka.listener.concurrency=1
spring.kafka.listener.default-retry-topic-enabled=false

# Resilience4j configuration
resilience4j.retry.instances.payment.max-attempts=2
resilience4j.retry.instances.payment.wait-duration=1s
resilience4j.circuitbreaker.instances.payment.sliding-window-size=10
resilience4j.circuitbreaker.instances.payment.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.payment.wait-duration-in-open-state=10s
resilience4j.timelimiter.instances.payment.timeout-duration=2s
logging.level.io.github.resilience4j.retry: DEBUG
